<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Verify Inventory Email</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Arial,sans-serif;color:#0f172a;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="640" cellpadding="0" cellspacing="0" style="max-width:640px;width:100%;background:#ffffff;border:1px solid #cbd5e1;border-radius:10px;overflow:hidden;">
                    <tr>
                        <td style="background:#1e293b;padding:18px 22px;color:#ffffff;">
                            <h2 style="margin:0;font-size:20px;line-height:1.3;">ABB Inventory Email Verification</h2>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 22px;">
                            <p style="margin:0 0 12px;font-size:14px;line-height:1.6;">
                                Hi {{ first_name }} {{ last_name }},
                            </p>
                            <p style="margin:0 0 12px;font-size:14px;line-height:1.6;">
                                You were granted access to the <strong>{{ department_name }}</strong> inventory workspace by <strong>{{ reporting_manager_name }}</strong>.
                                Please verify your email address before you can login.
                            </p>
                            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:10px 0 14px;">
                                <tr>
                                    <td style="border-radius:6px;background:#2563eb;">
                                        <a href="{{ verification_url }}" style="display:inline-block;padding:11px 16px;color:#ffffff;text-decoration:none;font-size:14px;font-weight:700;">Verify Email Address</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
