services:
  migrate:
    build: .
    env_file:
      - .env.prod
    environment:
      DJANGO_ENV: production
    command: python manage.py migrate --noinput

  web:
    build: .
    env_file:
      - .env.prod
    environment:
      DJANGO_ENV: production
    command: sh -c "python manage.py collectstatic --noinput && gunicorn abb_inventory_system.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
